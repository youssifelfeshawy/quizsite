<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d14;
            --surface: #13131f;
            --card: #1a1a2b;
            --border: #2a2a40;
            --text: #e8e8f0;
            --muted: #7070a0;
            --accent: #6c63ff;
            --accent2: #ff6b9d;
            --correct: #22d3a0;
            --wrong: #ff5c7a;
            --glow: rgba(108,99,255,0.25);
        }
        body.light {
            --bg: #f0f0f8;
            --surface: #ffffff;
            --card: #ffffff;
            --border: #e0e0ee;
            --text: #1a1a2b;
            --muted: #8080aa;
            --accent: #5a52e0;
            --accent2: #e0547e;
            --correct: #18b88a;
            --wrong: #e04060;
            --glow: rgba(90,82,224,0.15);
        }
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 30px 16px 60px;
            transition: background 0.4s, color 0.4s;
        }

        /* Ambient background glow */
        body::before {
            content: '';
            position: fixed;
            top: -200px; left: 50%;
            transform: translateX(-50%);
            width: 700px; height: 500px;
            background: radial-gradient(ellipse, var(--glow) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .theme-toggle {
            position: fixed; top: 20px; right: 20px; z-index: 100;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 50px; padding: 6px;
            cursor: pointer; display: flex; align-items: center;
            gap: 6px; font-size: 18px;
            transition: all 0.3s;
        }
        .theme-toggle:hover { border-color: var(--accent); }

        .wrap {
            position: relative; z-index: 1;
            width: 100%; max-width: 720px;
        }

        /* ===== SELECTION SCREEN ===== */
        #select-screen { animation: fadeUp 0.5s ease; }

        .brand {
            text-align: center;
            margin-bottom: 48px;
        }
        .brand h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(2rem, 5vw, 3.2rem);
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.1;
        }
        .brand p {
            color: var(--muted);
            margin-top: 10px;
            font-size: 1rem;
        }

        .quiz-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
        }

        .quiz-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.25s;
            position: relative;
            overflow: hidden;
        }
        .quiz-card::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            opacity: 0;
            transition: opacity 0.25s;
        }
        .quiz-card:hover { 
            border-color: var(--accent);
            transform: translateY(-3px);
            box-shadow: 0 12px 40px var(--glow);
        }
        .quiz-card:hover::before { opacity: 0.04; }

        .quiz-card-icon {
            font-size: 2rem;
            margin-bottom: 14px;
            display: block;
        }
        .quiz-card h3 {
            font-family: 'Syne', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .quiz-card p {
            color: var(--muted);
            font-size: 0.85rem;
            line-height: 1.5;
        }
        .quiz-card-meta {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        .badge {
            font-size: 0.75rem;
            padding: 3px 10px;
            border-radius: 20px;
            background: var(--border);
            color: var(--muted);
            font-weight: 500;
        }
        .badge.accent { background: rgba(108,99,255,0.15); color: var(--accent); }

        /* ===== QUIZ SCREEN ===== */
        #quiz-screen { animation: fadeUp 0.4s ease; }

        .quiz-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 24px;
        }
        .back-btn {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 10px;
            padding: 8px 14px;
            cursor: pointer;
            font-size: 0.9rem;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .back-btn:hover { border-color: var(--accent); color: var(--accent); }

        .quiz-title-bar {
            flex: 1;
        }
        .quiz-title-bar h2 {
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 700;
        }
        .quiz-title-bar span {
            color: var(--muted);
            font-size: 0.8rem;
        }

        .progress-wrap {
            background: var(--border);
            border-radius: 99px;
            height: 6px;
            overflow: hidden;
            margin-bottom: 28px;
        }
        #progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            transition: width 0.4s cubic-bezier(.4,0,.2,1);
            border-radius: 99px;
        }

        .q-meta {
            color: var(--muted);
            font-size: 0.82rem;
            margin-bottom: 8px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .question {
            font-family: 'Syne', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 24px;
            line-height: 1.45;
        }

        .options-grid { display: grid; gap: 10px; }

        .option {
            display: flex; align-items: center; gap: 14px;
            padding: 14px 18px;
            background: var(--card);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.95rem;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            text-align: left;
            transition: all 0.2s;
        }
        .option:hover:not(:disabled) {
            border-color: var(--accent);
            background: var(--surface);
        }
        .option-letter {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            color: var(--accent);
            min-width: 22px;
            font-size: 0.9rem;
        }
        .option.correct {
            background: rgba(34,211,160,0.1) !important;
            border-color: var(--correct) !important;
            color: var(--correct) !important;
        }
        .option.correct .option-letter { color: var(--correct) !important; }
        .option.wrong {
            background: rgba(255,92,122,0.1) !important;
            border-color: var(--wrong) !important;
            color: var(--wrong) !important;
        }
        .option.wrong .option-letter { color: var(--wrong) !important; }

        .btn-row {
            display: flex; gap: 10px; margin-top: 20px;
        }
        .btn {
            flex: 1;
            padding: 13px 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
        }
        .btn-primary:hover { opacity: 0.88; }
        .btn-ghost {
            background: var(--card);
            border: 1.5px solid var(--border);
            color: var(--text);
        }
        .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

        /* ===== RESULT SCREEN ===== */
        #result-screen { animation: fadeUp 0.4s ease; }

        .result-header { text-align: center; margin-bottom: 32px; }
        .result-header h2 {
            font-family: 'Syne', sans-serif;
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 12px;
        }
        .score-ring {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 140px; height: 140px;
            border-radius: 50%;
            border: 4px solid var(--accent);
            background: rgba(108,99,255,0.07);
            margin: 16px 0;
            box-shadow: 0 0 40px var(--glow);
        }
        .score-ring .num {
            font-family: 'Syne', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--accent);
            line-height: 1;
        }
        .score-ring .label {
            font-size: 0.75rem;
            color: var(--muted);
            margin-top: 4px;
        }

        .wrong-section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            margin-top: 24px;
            margin-bottom: 20px;
        }
        .wrong-section h3 {
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 16px;
        }
        .wrong-item {
            padding: 14px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
            line-height: 1.5;
        }
        .wrong-item:last-child { border-bottom: none; padding-bottom: 0; }
        .wrong-item .q { font-weight: 600; margin-bottom: 6px; }
        .ans-wrong { color: var(--wrong); }
        .ans-correct { color: var(--correct); }

        .result-btns { display: flex; gap: 10px; }

        /* Utility */
        .hidden { display: none !important; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">☀️</button>

    <div class="wrap">

        <!-- SELECTION SCREEN -->
        <div id="select-screen">
            <div class="brand">
                <h1>Quiz Player</h1>
                <p>Choose a quiz to begin</p>
            </div>
            <div class="quiz-grid" id="quiz-grid"></div>
        </div>

        <!-- QUIZ SCREEN -->
        <div id="quiz-screen" class="hidden">
            <div class="quiz-header">
                <button class="back-btn" onclick="goHome()">← Quizzes</button>
                <div class="quiz-title-bar">
                    <h2 id="active-quiz-title"></h2>
                    <span id="q-count"></span>
                </div>
            </div>
            <div class="progress-wrap"><div id="progress-bar"></div></div>
            <div class="q-meta" id="q-meta"></div>
            <div class="question" id="q-text"></div>
            <div class="options-grid" id="options-container"></div>
            <div class="btn-row">
                <button id="prev-btn" class="btn btn-ghost hidden" onclick="prevQuestion()">← Prev</button>
                <button id="next-btn" class="btn btn-primary hidden" onclick="nextQuestion()">Next →</button>
            </div>
        </div>

        <!-- RESULT SCREEN -->
        <div id="result-screen" class="hidden">
            <div class="result-header">
                <h2 id="result-quiz-title"></h2>
                <div class="score-ring">
                    <span class="num" id="final-score"></span>
                    <span class="label">correct</span>
                </div>
                <div id="result-msg" style="color:var(--muted);font-size:0.9rem;"></div>
            </div>
            <div class="wrong-section" id="wrong-section"></div>
            <div class="result-btns">
                <button class="btn btn-ghost" onclick="goHome()">← All Quizzes</button>
                <button class="btn btn-primary" onclick="restartQuiz()">🔄 Restart</button>
            </div>
        </div>

    </div>

    // ---- Start quiz ----
    function startQuiz(quiz) {
        activeQuiz = quiz;
        currentIdx = 0;
        score = 0;
        userAnswers = [];

        originalQuestions = JSON.parse(JSON.stringify(quiz.questions));
        questions = prepare(JSON.parse(JSON.stringify(quiz.questions)), quiz);

        document.getElementById('active-quiz-title').textContent = quiz.title;
        show('quiz-screen');
        loadQuestion();
    }

    function prepare(qs, quiz) {
        if (quiz.shuffleQuestions) qs.sort(() => Math.random() - 0.5);
        if (quiz.shuffleAnswers) {
            qs.forEach(q => {
                const correct = q.options[q.answer];
                const idx = q.options.map((_,i)=>i);
                for (let i = idx.length-1; i > 0; i--) {
                    const j = Math.floor(Math.random()*(i+1));
                    [idx[i],idx[j]] = [idx[j],idx[i]];
                }
                q.options = idx.map(i => q.options[i]);
                q.answer = q.options.indexOf(correct);
            });
        }
        return qs;
    }

    // ---- Load question ----
    function loadQuestion() {
        if (currentIdx >= questions.length) { showResult(); return; }

        const q = questions[currentIdx];
        const total = questions.length;
        const pct = (currentIdx / total) * 100;

        document.getElementById('q-meta').textContent = `Question ${currentIdx+1} of ${total}`;
        document.getElementById('q-count').textContent = `${currentIdx+1} / ${total}`;
        document.getElementById('progress-bar').style.width = pct + '%';
        document.getElementById('q-text').textContent = q.question;

        const container = document.getElementById('options-container');
        container.innerHTML = '';
        const letters = ['A','B','C','D','E','F'];

        q.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option';
            btn.innerHTML = `<span class="option-letter">${letters[i]}.</span><span>${opt}</span>`;
            btn.onclick = () => checkAnswer(i, btn);
            container.appendChild(btn);
        });

        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        prevBtn.classList.toggle('hidden', currentIdx === 0);
        nextBtn.classList.add('hidden');
        nextBtn.textContent = currentIdx === total-1 ? 'Submit ✓' : 'Next →';

        // Restore answer if already answered
        const ua = userAnswers[currentIdx];
        if (ua) {
            const allBtns = container.querySelectorAll('.option');
            allBtns.forEach(b => b.disabled = true);
            const selIdx = questions[currentIdx].options.indexOf(ua.selected);
            allBtns[questions[currentIdx].answer].classList.add('correct');
            if (!ua.isCorrect && selIdx >= 0) allBtns[selIdx].classList.add('wrong');
            nextBtn.classList.remove('hidden');
        }
    }

    function checkAnswer(selected, btn) {
        const q = questions[currentIdx];
        const allBtns = document.querySelectorAll('.option');
        allBtns.forEach(b => b.disabled = true);

        const isCorrect = selected === q.answer;
        userAnswers[currentIdx] = {
            question: q.question,
            selected: q.options[selected],
            correct: q.options[q.answer],
            isCorrect
        };

        if (isCorrect) { btn.classList.add('correct'); score++; }
        else { btn.classList.add('wrong'); allBtns[q.answer].classList.add('correct'); }

        document.getElementById('next-btn').classList.remove('hidden');
    }

    function nextQuestion() { currentIdx++; loadQuestion(); window.scrollTo(0,0); }

            ws.innerHTML = '<h3>Review</h3><p style="color:var(--correct);margin-top:8px;">✓ All answers correct!</p>';
        } else {
            let html = '<h3>Review Wrong Answers</h3>';
            wrongs.forEach((wa, i) => {
                html += `<div class="wrong-item">
                    <div class="q">${i+1}. ${wa.question}</div>
                    <div class="ans-wrong">✗ Your answer: ${wa.selected}</div>
                    <div class="ans-correct">✓ Correct: ${wa.correct}</div>
                </div>`;
            });
            ws.innerHTML = html;
        }

        document.getElementById('progress-bar').style.width = '100%';
        show('result-screen');
    }

    // ---- Init ----
    window.addEventListener('load', buildSelectScreen);
    window.onbeforeunload = () => activeQuiz ? "Reloading will reset your quiz progress." : undefined;
    </script>
</body>
</html>
